# Hacker News Agent 配置文件

# Hacker News 配置
hackernews:
  top_stories_limit: 30      # 拉取数量
  request_delay: 0.1         # 请求间隔（秒）

# 过滤规则
filter:
  min_score: 50              # 最低点赞数
  keywords:                  # 包含关键词（不区分大小写）
    - ai
    - llm
    - agent
    - langchain
    - openai
    - anthropic
    - rag
    - prompt
    - gpt
    - claude
    - python
  exclude:                   # 排除关键词
    - hiring
    - ask hn: who is hiring

# 推送配置
serverchan:
  send_key: "${SERVERCHAN_KEY}"  # 环境变量引用

# 数据库
database:
  path: "data/hackernews.db"

# 日志配置
logging:
  level: "INFO"
  file: "logs/app.log"
  max_bytes: 10485760        # 10MB
  backup_count: 5

# 调度配置
scheduler:
  cron: "0 8 * * *"         # 每天 08:00 执行
  timezone: "Asia/Shanghai"
